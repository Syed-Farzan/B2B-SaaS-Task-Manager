services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: saas_task_manager

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  api:
    build: .

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      - DATABASE_URL=postgresql://postgres:12345@db:5432/saas_task_manager

volumes:
  postgres_data:
